<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lookout" />
  <title>Lookout — Soccer Scan Trainer</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="stage" class="stage" aria-live="polite">
    <div id="display" class="display"></div>
  </main>

  <button id="toggleSettings" class="settings-toggle" aria-label="Toggle settings" aria-expanded="true">
    <svg class="toggle-icon" viewBox="0 0 64 64" aria-hidden="true">
      <path d="M5 32 C 15 11, 49 11, 59 32 C 49 53, 15 53, 5 32 Z"
            fill="#4ade80" stroke="#0b1f14" stroke-width="1.5" stroke-linejoin="round"/>
      <g transform="translate(32 32)">
        <circle r="13" fill="#ffffff" stroke="#0b1f14" stroke-width="1.5"/>
        <polygon points="0,-5 4.76,-1.55 2.94,4.05 -2.94,4.05 -4.76,-1.55" fill="#0b1f14"/>
        <g stroke="#0b1f14" stroke-width="1.6" stroke-linecap="round">
          <line x1="0"     y1="-5"    x2="0"      y2="-12"/>
          <line x1="4.76"  y1="-1.55" x2="11.41"  y2="-3.71"/>
          <line x1="2.94"  y1="4.05"  x2="7.05"   y2="9.71"/>
          <line x1="-2.94" y1="4.05"  x2="-7.05"  y2="9.71"/>
          <line x1="-4.76" y1="-1.55" x2="-11.41" y2="-3.71"/>
        </g>
      </g>
    </svg>
  </button>

  <aside id="settings" class="settings" aria-label="Settings">
    <header class="brand">
      <h1>Lookout<span class="brand-bang">!</span></h1>
      <p class="brand-tag">Scan trainer</p>
    </header>

    <label class="field">
      <span>Mode</span>
      <select id="mode">
        <option value="colors">Colors</option>
        <option value="numbers">Numbers</option>
        <option value="math">Math</option>
        <option value="mixed">Mixed</option>
      </select>
    </label>

    <label class="field">
      <span>Interval <output id="intervalLabel">4.0s</output></span>
      <input id="interval" type="range" min="1" max="10" step="0.5" value="4" />
    </label>

    <label class="checkbox">
      <input id="sound" type="checkbox" checked />
      <span>Beep on change</span>
    </label>

    <label class="checkbox">
      <input id="wakelock" type="checkbox" checked />
      <span>Keep screen on</span>
    </label>

    <div class="controls">
      <button id="playPause" class="primary">Start</button>
      <button id="fullscreen">Fullscreen</button>
    </div>

    <p class="hint">Glance over your shoulder when you hear the beep, call out what you see, then play.</p>
  </aside>

  <script src="app.js"></script>
</body>
</html>
